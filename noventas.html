<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor de Ventas - Reparado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; padding: 20px; }
        .container { max-width: 1500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .upload-section { border: 2px dashed #3498db; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 25px; background: #ebf5fb; }
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 25px; background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .filter-group { display: flex; flex-direction: column; gap: 4px; }
        .filter-group label { font-size: 10px; font-weight: bold; color: #2c3e50; text-transform: uppercase; }
        select { padding: 6px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 11px; }
        .results-table-container { overflow-x: auto; max-height: 700px; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #2c3e50; color: white; padding: 12px; text-align: left; position: sticky; top: 0; z-index: 10; }
        td { padding: 10px; border-bottom: 1px solid #dee2e6; white-space: nowrap; }
        
        /* COLORES DE FILA */
        .row-sin-ventas { background-color: #ffcdd2 !important; } /* Rojo más intenso para notar la diferencia */
        .row-con-ventas { background-color: #c8e6c9 !important; } /* Verde más intenso */
        
        .debug-msg { font-size: 12px; padding: 10px; margin-bottom: 10px; border-radius: 5px; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Panel de Seguimiento (Detector de Columnas)</h2>
    
    <div class="upload-section">
        <input type="file" id="uploadExcel" accept=".xlsx, .xls">
        <div id="debugBox" class="debug-msg"></div>
    </div>

    <div id="mainContent" style="display:none;">
        <div class="filters-grid" id="filtersContainer"></div>
        <div class="results-table-container">
            <table>
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let rawData = [];
    let columns = [];
    let activeFilters = {};
    let statusColRealName = ""; // Guardará el nombre exacto que encuentre en el Excel

    const ORDEN_DIAS = { "LUNES": 1, "MARTES": 2, "MIERCOLES": 3, "MIÉRCOLES": 3, "JUEVES": 4, "VIERNES": 5, "SABADO": 6, "SÁBADO": 6, "DOMINGO": 7 };

    document.getElementById('uploadExcel').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = (event) => {
            const data = new Uint8Array(event.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const matrix = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
            const dataRows = matrix.slice(3);

            if (dataRows.length > 0) {
                const originalHeaders = dataRows[0].map(h => h ? h.toString().trim() : "");
                const indicesOcultos = [0, 7, 15];
                
                // Detectar el nombre real de la columna de Status
                statusColRealName = originalHeaders.find(h => 
                    h.toUpperCase().includes("STATUS") && h.toUpperCase().includes("PROYECTO")
                );

                const debugBox = document.getElementById('debugBox');
                if (statusColRealName) {
                    debugBox.innerHTML = `✅ Columna detectada para colores: <strong>"${statusColRealName}"</strong>`;
                    debugBox.className = "debug-msg success";
                } else {
                    debugBox.innerHTML = `⚠️ No se encontró la columna "STATUS PROYECTO". Revisa que el nombre sea exacto en la fila 4.`;
                    debugBox.className = "debug-msg warning";
                }
                debugBox.style.display = "block";

                columns = originalHeaders.filter((_, idx) => !indicesOcultos.includes(idx));

                const rows = dataRows.slice(1);
                rawData = rows.map(row => {
                    let obj = {};
                    originalHeaders.forEach((name, idx) => {
                        if (!indicesOcultos.includes(idx)) obj[name] = row[idx] || "";
                    });
                    return obj;
                });

                rawData.sort((a, b) => (ORDEN_DIAS[String(a["DÍA DE ATENCIÓN"]).toUpperCase()] || 99) - (ORDEN_DIAS[String(b["DÍA DE ATENCIÓN"]).toUpperCase()] || 99));

                setupInterface();
            }
        };
        reader.readAsArrayBuffer(file);
    });

    function setupInterface() {
        document.getElementById('mainContent').style.display = 'block';
        const container = document.getElementById('filtersContainer');
        container.innerHTML = '';
        activeFilters = {};

        columns.forEach(col => {
            if(!col) return;
            const group = document.createElement('div');
            group.className = 'filter-group';
            const uniqueValues = [...new Set(rawData.map(item => item[col]))].filter(v => v !== '').sort();
            group.innerHTML = `<label>${col}</label><select onchange="updateFilter('${col}', this.value)"><option value="ALL">-- Ver todos --</option>${uniqueValues.map(v => `<option value="${v}">${v}</option>`).join('')}</select>`;
            container.appendChild(group);
        });
        renderTable();
    }

    function updateFilter(column, value) {
        if (value === "ALL") delete activeFilters[column];
        else activeFilters[column] = value;
        renderTable();
    }

   function renderTable() {
        const filteredData = rawData.filter(row => Object.keys(activeFilters).every(col => String(row[col]) === String(activeFilters[col])));
        document.getElementById('tableHead').innerHTML = `<tr>${columns.map(col => `<th>${col}</th>`).join('')}</tr>`;
        
        const body = document.getElementById('tableBody');
        body.innerHTML = filteredData.map(row => {
            let rowClass = "";
            if (statusColRealName) {
                // Convertimos a mayúsculas y quitamos espacios para comparar mejor
                const val = String(row[statusColRealName] || "").toUpperCase().trim();
                
                // Nueva lógica: busca "SIN VENTA" o "SIN VENTAS"
                if (val.includes("SIN VENTA")) {
                    rowClass = "row-sin-ventas";
                } 
                // Busca "CON VENTA" o "CON VENTAS"
                else if (val.includes("CON VENTA")) {
                    rowClass = "row-con-ventas";
                }
            }
            return `<tr class="${rowClass}">${columns.map(col => `<td>${row[col] || ''}</td>`).join('')}</tr>`;
        }).join('');
    }
</script>
</body>
</html>
