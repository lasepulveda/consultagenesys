<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor de Ventas - Status Proyecto</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; padding: 20px; color: #333; }
        .container { max-width: 1500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .upload-section { border: 2px dashed #3498db; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 25px; background: #ebf5fb; }
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 25px; background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .filter-group { display: flex; flex-direction: column; gap: 4px; }
        .filter-group label { font-size: 10px; font-weight: bold; color: #2c3e50; text-transform: uppercase; }
        select { padding: 6px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 11px; }
        
        .results-table-container { overflow-x: auto; max-height: 700px; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #2c3e50; color: white; padding: 12px; text-align: left; position: sticky; top: 0; z-index: 10; }
        td { padding: 10px; border-bottom: 1px solid #dee2e6; white-space: nowrap; }
        
        /* Colores de Status específicos */
        .row-sin-ventas { background-color: #ffdce0 !important; } /* Rojo suave */
        .row-con-ventas { background-color: #d4edda !important; } /* Verde suave */
        tr:hover { filter: brightness(0.98); }

        .stats { margin-bottom: 10px; font-weight: bold; color: #2980b9; }
        .legend { font-size: 12px; display: flex; gap: 20px; justify-content: center; margin-top: 10px; font-weight: 500; }
        .dot { height: 12px; width: 12px; border-radius: 3px; display: inline-block; margin-right: 5px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Panel de Seguimiento: Status Proyecto</h2>
    
    <div class="upload-section">
        <strong>Paso 1: Carga tu archivo</strong><br><br>
        <input type="file" id="uploadExcel" accept=".xlsx, .xls">
        <div class="legend">
            <span><span class="dot" style="background:#ffdce0; border:1px solid #f5c6cb;"></span> Status: SIN VENTAS</span>
            <span><span class="dot" style="background:#d4edda; border:1px solid #c3e6cb;"></span> Status: CON VENTAS</span>
        </div>
    </div>

    <div id="mainContent" style="display:none;">
        <div id="stats" class="stats"></div>
        <div class="filters-grid" id="filtersContainer"></div>
        <div class="results-table-container">
            <table>
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let rawData = [];
    let columns = [];
    let activeFilters = {};

    const ORDEN_DIAS = {
        "LUNES": 1, "MARTES": 2, "MIERCOLES": 3, "MIÉRCOLES": 3, 
        "JUEVES": 4, "VIERNES": 5, "SABADO": 6, "SÁBADO": 6, "DOMINGO": 7
    };

    document.getElementById('uploadExcel').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = (event) => {
            const data = new Uint8Array(event.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const matrix = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
            
            const dataRows = matrix.slice(3); // Salto de 3 filas

            if (dataRows.length > 0) {
                const originalHeaders = dataRows[0];
                const indicesOcultos = [0, 7, 15]; // Omitir A, H, P
                
                columns = originalHeaders.filter((_, idx) => !indicesOcultos.includes(idx))
                                         .map(c => c ? c.toString().trim() : "COL_VACIA");

                const rows = dataRows.slice(1);
                rawData = rows.map(row => {
                    let obj = {};
                    let colCounter = 0;
                    originalHeaders.forEach((_, idx) => {
                        if (!indicesOcultos.includes(idx)) {
                            obj[columns[colCounter]] = row[idx] !== undefined ? row[idx] : "";
                            colCounter++;
                        }
                    });
                    return obj;
                });

                // Orden Lunes-Viernes
                rawData.sort((a, b) => {
                    const diaA = ORDEN_DIAS[String(a["DÍA DE ATENCIÓN"]).toUpperCase()] || 99;
                    const diaB = ORDEN_DIAS[String(b["DÍA DE ATENCIÓN"]).toUpperCase()] || 99;
                    return diaA - diaB;
                });

                setupInterface();
            }
        };
        reader.readAsArrayBuffer(file);
    });

    function setupInterface() {
        document.getElementById('mainContent').style.display = 'block';
        const container = document.getElementById('filtersContainer');
        container.innerHTML = '';
        activeFilters = {};

        columns.forEach(col => {
            if(col === "COL_VACIA") return;
            const group = document.createElement('div');
            group.className = 'filter-group';
            const uniqueValues = [...new Set(rawData.map(item => item[col]))].filter(v => v !== '').sort();

            group.innerHTML = `
                <label>${col}</label>
                <select onchange="updateFilter('${col}', this.value)">
                    <option value="ALL">-- Ver todos --</option>
                    ${uniqueValues.map(v => `<option value="${v}">${v}</option>`).join('')}
                </select>
            `;
            container.appendChild(group);
        });
        renderTable();
    }

    function updateFilter(column, value) {
        if (value === "ALL") delete activeFilters[column];
        else activeFilters[column] = value;
        renderTable();
    }

    function renderTable() {
        const filteredData = rawData.filter(row => {
            return Object.keys(activeFilters).every(col => String(row[col]) === String(activeFilters[col]));
        });

        document.getElementById('stats').innerText = `Clientes filtrados: ${filteredData.length}`;
        document.getElementById('tableHead').innerHTML = `<tr>${columns.map(col => `<th>${col}</th>`).join('')}</tr>`;
        
        const body = document.getElementById('tableBody');
        body.innerHTML = filteredData.map(row => {
            // Lógica de color enfocada en "STATUS PROYECTO"
            let rowClass = "";
            const statusValue = String(row["STATUS PROYECTO"] || "").toUpperCase();
            
            if (statusValue.includes("SIN VENTAS")) rowClass = "row-sin-ventas";
            else if (statusValue.includes("CON VENTAS")) rowClass = "row-con-ventas";

            return `
                <tr class="${rowClass}">
                    ${columns.map(col => `<td>${row[col] || ''}</td>`).join('')}
                </tr>
            `;
        }).join('');
    }
</script>
</body>
</html>
