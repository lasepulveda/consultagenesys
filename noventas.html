<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor de Ventas - Vista Optimizada</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .upload-section { border: 2px dashed #27ae60; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 25px; background: #ebfaf0; }
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 25px; background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .filter-group { display: flex; flex-direction: column; gap: 4px; }
        .filter-group label { font-size: 10px; font-weight: bold; color: #2c3e50; text-transform: uppercase; }
        select { padding: 6px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 11px; background: white; }
        .results-table-container { overflow-x: auto; max-height: 650px; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #2c3e50; color: white; padding: 10px; text-align: left; position: sticky; top: 0; z-index: 10; }
        td { padding: 8px 10px; border-bottom: 1px solid #edf2f7; white-space: nowrap; }
        tr:nth-child(even) { background: #fcfcfc; }
        tr:hover { background: #f1f5f9; }
        .stats { margin-bottom: 10px; font-weight: bold; color: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 Planificador de Ventas Semanal</h2>
    
    <div class="upload-section">
        <input type="file" id="uploadExcel" accept=".xlsx, .xls">
        <p style="font-size: 11px; color: #666; margin-top: 8px;">Omitiendo filas 1-3 | Columnas A, H y P ocultas | Ordenado por día de la semana.</p>
    </div>

    <div id="mainContent" style="display:none;">
        <div id="stats" class="stats"></div>
        <div class="filters-grid" id="filtersContainer"></div>
        <div class="results-table-container">
            <table>
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let rawData = [];
    let columns = [];
    let activeFilters = {};

    // Mapeo para orden lógico de días
    const ORDEN_DIAS = {
        "LUNES": 1, "MARTES": 2, "MIERCOLES": 3, "MIÉRCOLES": 3, 
        "JUEVES": 4, "VIERNES": 5, "SABADO": 6, "SÁBADO": 6, "DOMINGO": 7
    };

    document.getElementById('uploadExcel').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = (event) => {
            const data = new Uint8Array(event.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const matrix = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
            
            // 1. Omitir 3 primeras filas
            const dataRows = matrix.slice(3);

            if (dataRows.length > 0) {
                // 2. Identificar encabezados originales
                const originalHeaders = dataRows[0];
                
                // 3. Filtrar columnas (Omitir A=0, H=7, P=15)
                const indicesAFiltrar = [0, 7, 15];
                columns = originalHeaders.filter((_, idx) => !indicesAFiltrar.includes(idx))
                                         .map(c => c ? c.toString().trim() : "COL_SIN_NOMBRE");

                // 4. Procesar filas omitiendo esas columnas
                const rows = dataRows.slice(1);
                rawData = rows.map(row => {
                    let obj = {};
                    let colCounter = 0;
                    originalHeaders.forEach((_, idx) => {
                        if (!indicesAFiltrar.includes(idx)) {
                            const colName = columns[colCounter];
                            obj[colName] = row[idx] !== undefined ? row[idx] : "";
                            colCounter++;
                        }
                    });
                    return obj;
                });

                // 5. Aplicar orden lógico por "DÍA DE ATENCIÓN" (Columna G)
                // Buscamos el nombre exacto de la columna G que ahora está en columns
                const nombreColDia = "DÍA DE ATENCIÓN"; 
                rawData.sort((a, b) => {
                    const diaA = ORDEN_DIAS[String(a[nombreColDia]).toUpperCase()] || 99;
                    const diaB = ORDEN_DIAS[String(b[nombreColDia]).toUpperCase()] || 99;
                    return diaA - diaB;
                });

                setupInterface();
            }
        };
        reader.readAsArrayBuffer(file);
    });

    function setupInterface() {
        document.getElementById('mainContent').style.display = 'block';
        const container = document.getElementById('filtersContainer');
        container.innerHTML = '';
        activeFilters = {};

        columns.forEach(col => {
            if(col === "COL_SIN_NOMBRE") return;
            const group = document.createElement('div');
            group.className = 'filter-group';
            const uniqueValues = [...new Set(rawData.map(item => item[col]))].filter(v => v !== '').sort();

            group.innerHTML = `
                <label>${col}</label>
                <select onchange="updateFilter('${col}', this.value)">
                    <option value="ALL">-- Ver todos --</option>
                    ${uniqueValues.map(v => `<option value="${v}">${v}</option>`).join('')}
                </select>
            `;
            container.appendChild(group);
        });
        renderTable();
    }

    function updateFilter(column, value) {
        if (value === "ALL") delete activeFilters[column];
        else activeFilters[column] = value;
        renderTable();
    }

    function renderTable() {
        const filteredData = rawData.filter(row => {
            return Object.keys(activeFilters).every(col => String(row[col]) === String(activeFilters[col]));
        });

        document.getElementById('stats').innerText = `Clientes en lista: ${filteredData.length}`;
        document.getElementById('tableHead').innerHTML = `<tr>${columns.map(col => `<th>${col}</th>`).join('')}</tr>`;
        document.getElementById('tableBody').innerHTML = filteredData.map(row => `
            <tr>${columns.map(col => `<td>${row[col] || ''}</td>`).join('')}</tr>
        `).join('');
    }
</script>
</body>
</html>
