<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Analizador Inteligente de Excel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f9; padding: 20px; color: #333; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; font-size: 22px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .upload-section { background: #ffffff; border: 2px dashed #cbd5e0; padding: 30px; border-radius: 12px; text-align: center; margin-bottom: 25px; transition: 0.3s; }
        .upload-section:hover { border-color: #3182ce; background: #ebf8ff; }
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-bottom: 25px; background: #f8fafc; padding: 20px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 11px; font-weight: bold; color: #718096; text-transform: uppercase; }
        select { padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; background: white; font-size: 13px; cursor: pointer; }
        .stats { margin-bottom: 15px; font-size: 14px; font-weight: 600; color: #4a5568; }
        .results-table-container { overflow-x: auto; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; }
        th { background: #edf2f7; padding: 12px; text-align: left; color: #2d3748; sticky; top: 0; }
        td { padding: 10px 12px; border-bottom: 1px solid #edf2f7; }
        tr:hover { background: #f7fafc; }
        .no-data { text-align: center; padding: 40px; color: #a0aec0; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Panel de Control Dinámico</h1>
    
    <div class="upload-section" id="dropZone">
        <strong>Arrastra tu Excel aquí o</strong><br><br>
        <input type="file" id="uploadExcel" accept=".xlsx, .xls">
    </div>

    <div id="mainContent" style="display:none;">
        <div id="stats" class="stats"></div>
        <div class="filters-grid" id="filtersContainer">
            </div>

        <div class="results-table-container">
            <table id="dataTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let rawData = [];
    let columns = [];
    let activeFilters = {};

    document.getElementById('uploadExcel').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = (event) => {
            const data = new Uint8Array(event.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const sheet = wb.Sheets[wb.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet);

            if (json.length > 0) {
                rawData = json;
                columns = Object.keys(json[0]);
                setupInterface();
            }
        };
        reader.readAsArrayBuffer(file);
    });

    function setupInterface() {
        document.getElementById('mainContent').style.display = 'block';
        const container = document.getElementById('filtersContainer');
        container.innerHTML = '';
        activeFilters = {};

        columns.forEach(col => {
            const group = document.createElement('div');
            group.className = 'filter-group';
            
            const uniqueValues = [...new Set(rawData.map(item => item[col]))]
                .filter(v => v !== null && v !== undefined && v !== '')
                .sort();

            group.innerHTML = `
                <label>${col}</label>
                <select id="filter-${col}" onchange="updateFilter('${col}', this.value)">
                    <option value="ALL">-- Ver todos --</option>
                    ${uniqueValues.map(v => `<option value="${v}">${v}</option>`).join('')}
                </select>
            `;
            container.appendChild(group);
        });

        renderTable();
    }

    function updateFilter(column, value) {
        if (value === "ALL") {
            delete activeFilters[column];
        } else {
            activeFilters[column] = value;
        }
        renderTable();
    }

    function renderTable() {
        const filteredData = rawData.filter(row => {
            return Object.keys(activeFilters).every(col => {
                return String(row[col]) === String(activeFilters[col]);
            });
        });

        document.getElementById('stats').innerText = `Registros encontrados: ${filteredData.length} de ${rawData.length}`;

        // Render Head
        const head = document.getElementById('tableHead');
        head.innerHTML = `<tr>${columns.map(col => `<th>${col}</th>`).join('')}</tr>`;

        // Render Body
        const body = document.getElementById('tableBody');
        if (filteredData.length === 0) {
            body.innerHTML = `<tr><td colspan="${columns.length}" class="no-data">No hay datos que coincidan con los filtros</td></tr>`;
        } else {
            body.innerHTML = filteredData.map(row => `
                <tr>${columns.map(col => `<td>${row[col] || '-'}</td>`).join('')}</tr>
            `).join('');
        }
    }
</script>

</body>
</html>
