<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Analizador Pro - Filtros Dinámicos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .upload-section { border: 2px dashed #3182ce; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 25px; background: #ebf8ff; }
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; background: #f8fafc; padding: 20px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 10px; font-weight: bold; color: #4a5568; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        select { padding: 8px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 12px; }
        .results-table-container { overflow-x: auto; max-height: 600px; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #2c3e50; color: white; padding: 12px; text-align: left; position: sticky; top: 0; z-index: 10; }
        td { padding: 8px 12px; border-bottom: 1px solid #edf2f7; white-space: nowrap; }
        tr:hover { background: #f7fafc; }
        .stats { margin-bottom: 10px; font-weight: bold; color: #2b6cb0; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Gestión de Ventas (Lectura desde Fila 4)</h2>
    
    <div class="upload-section">
        <input type="file" id="uploadExcel" accept=".xlsx, .xls">
        <p style="font-size: 12px; color: #666; margin-top: 10px;">El sistema omitirá automáticamente las primeras 3 filas de tu archivo.</p>
    </div>

    <div id="mainContent" style="display:none;">
        <div id="stats" class="stats"></div>
        <div class="filters-grid" id="filtersContainer"></div>
        <div class="results-table-container">
            <table id="dataTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let rawData = [];
    let columns = [];
    let activeFilters = {};

    document.getElementById('uploadExcel').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = (event) => {
            const data = new Uint8Array(event.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const sheet = wb.Sheets[wb.SheetNames[0]];
            
            /* ESTRATEGIA: Convertimos la hoja a una matriz (array de arrays) 
               para poder manipular las filas fácilmente.
            */
            const matrix = XLSX.utils.sheet_to_json(sheet, {header: 1});
            
            // Omitimos las primeras 3 filas (índice 0, 1 y 2)
            const dataRows = matrix.slice(3);

            if (dataRows.length > 1) {
                // La nueva "Fila 1" (originalmente la 4) son nuestros encabezados
                columns = dataRows[0].map(col => col ? col.toString().trim() : "SIN_NOMBRE");
                
                // El resto de filas son los datos
                const rows = dataRows.slice(1);
                
                // Convertimos de nuevo a formato objeto para que los filtros funcionen
                rawData = rows.map(row => {
                    let obj = {};
                    columns.forEach((colName, index) => {
                        obj[colName] = row[index] !== undefined ? row[index] : "";
                    });
                    return obj;
                });

                setupInterface();
            }
        };
        reader.readAsArrayBuffer(file);
    });

    function setupInterface() {
        document.getElementById('mainContent').style.display = 'block';
        const container = document.getElementById('filtersContainer');
        container.innerHTML = '';
        activeFilters = {};

        columns.forEach(col => {
            // No creamos filtros para columnas vacías
            if(col === "SIN_NOMBRE") return;

            const group = document.createElement('div');
            group.className = 'filter-group';
            
            const uniqueValues = [...new Set(rawData.map(item => item[col]))]
                .filter(v => v !== null && v !== undefined && v !== '')
                .sort();

            group.innerHTML = `
                <label>${col}</label>
                <select onchange="updateFilter('${col}', this.value)">
                    <option value="ALL">-- Todos --</option>
                    ${uniqueValues.map(v => `<option value="${v}">${v}</option>`).join('')}
                </select>
            `;
            container.appendChild(group);
        });

        renderTable();
    }

    function updateFilter(column, value) {
        if (value === "ALL") delete activeFilters[column];
        else activeFilters[column] = value;
        renderTable();
    }

    function renderTable() {
        const filteredData = rawData.filter(row => {
            return Object.keys(activeFilters).every(col => {
                return String(row[col]) === String(activeFilters[col]);
            });
        });

        document.getElementById('stats').innerText = `Mostrando ${filteredData.length} de ${rawData.length} registros`;

        document.getElementById('tableHead').innerHTML = `<tr>${columns.map(col => `<th>${col}</th>`).join('')}</tr>`;

        const body = document.getElementById('tableBody');
        body.innerHTML = filteredData.map(row => `
            <tr>${columns.map(col => `<td>${row[col] || ''}</td>`).join('')}</tr>
        `).join('');
    }
</script>

</body>
</html>
